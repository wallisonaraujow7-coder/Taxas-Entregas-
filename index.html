<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Tele Entregas Taxas</title>
<style><link rel="apple-touch-icon" href="logo.jpg">
<link rel="icon" href="logo.jpg">
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #181c27; --card: #1e2333; --border: #2a3045;
    --accent: #f97316; --accent-dim: rgba(249,115,22,0.12);
    --text: #e8eaf0; --muted: #8892a4; --green: #22c55e; --green-dim: rgba(34,197,94,0.12);
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 24px 16px 48px; }
  header { text-align: center; margin-bottom: 32px; }
  header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; letter-spacing: -0.03em; }
  header h1 span { color: var(--accent); }
  header p { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }
  .container { max-width: 540px; margin: 0 auto; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 16px; }
  label { display: block; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .search-wrap { position: relative; margin-bottom: 4px; }
  .search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; font-size: 1rem; color: var(--text); font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  #dropdown { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; z-index: 100; max-height: 260px; overflow-y: auto; display: none; }
  #dropdown.open { display: block; }
  #dropdown div { padding: 12px 16px; cursor: pointer; font-size: 0.95rem; transition: background 0.1s; }
  #dropdown div:hover { background: var(--accent-dim); color: var(--accent); }
  #dropdown div small { display: block; font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .input-section { display: none; margin-top: 20px; }
  .input-section.visible { display: block; }
  select, input[type="number"] { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; font-size: 1rem; color: var(--text); font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s; appearance: none; }
  select:focus, input[type="number"]:focus { border-color: var(--accent); }
  select option { background: var(--card); }
  #result { display: none; background: var(--green-dim); border: 1px solid rgba(34,197,94,0.3); border-radius: 16px; padding: 28px 24px; text-align: center; }
  #result.visible { display: block; }
  #result .store-name { font-size: 0.8rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--green); margin-bottom: 8px; }
  #result .fee { font-family: 'Space Grotesk', sans-serif; font-size: 3.2rem; font-weight: 700; color: #fff; letter-spacing: -0.03em; line-height: 1; }
  #result .fee-label { color: var(--muted); font-size: 0.85rem; margin-top: 8px; }
  #result .rule-note { margin-top: 14px; font-size: 0.82rem; color: var(--muted); background: rgba(0,0,0,0.2); border-radius: 8px; padding: 8px 12px; }
  #no-result { display: none; text-align: center; padding: 20px; color: var(--muted); font-size: 0.9rem; }
  #no-result.visible { display: block; }
  footer { text-align: center; margin-top: 24px; color: var(--muted); font-size: 0.78rem; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Central Tele Entregas <span>Taxas</span></h1>
    <p>Consulte o valor da taxa por estabelecimento</p>
  </header>
  <div class="card">
    <label>Estabelecimento</label>
    <div class="search-wrap">
      <input type="text" id="storeSearch" placeholder="Digite o nome do estabelecimento…" autocomplete="off">
      <div id="dropdown"></div>
    </div>
    <div id="zoneSection" class="input-section">
      <label>Selecione a zona</label>
      <select id="zoneSelect"><option value="">— escolha —</option></select>
    </div>
    <div id="distSection" class="input-section">
      <label>Distância em km</label>
      <input type="number" id="distInput" placeholder="Ex: 2.5" min="0" step="0.1">
    </div>
  </div>
  <div id="result">
    <div class="store-name" id="rStoreName"></div>
    <div class="fee" id="rFee"></div>
    <div class="fee-label">taxa de entrega</div>
    <div class="rule-note" id="rNote"></div>
  </div>
  <div id="no-result">Não foi possível calcular a taxa com os dados informados.</div>
  <footer>Central Tele Entregas · Tabela de Taxas</footer>
</div>
<script>
const STORES = [
  {name:"Cookies",type:"cbt"},{name:"R25",type:"cbt"},{name:"March Med",type:"cbt"},
  {name:"Witzig",type:"cbt"},{name:"Tabacaria",type:"cbt"},{name:"Mega Cel",type:"cbt"},
  {name:"Cultura",type:"cbt"},{name:"Mais Natural",type:"cbt"},{name:"Natsu",type:"cbt"},
  {name:"Elav",type:"cbt"},{name:"Baita",type:"cbt"},{name:"Orgânicos",type:"cbt"},
  {name:"Paladar",type:"cbt"},{name:"Daiane",type:"cbt"},{name:"Japinha",type:"cbt"},
  {name:"Maurinho",type:"cbt"},{name:"Tri Lanches",type:"cbt"},{name:"Mania de Vestir",type:"cbt"},
  {name:"Agatha",type:"agatha"},{name:"Amy",type:"agatha"},{name:"Kama",type:"agatha"},
  {name:"Órbita",type:"orbita"},{name:"Nickel",type:"nickel"},{name:"Texas",type:"nickel"},
  {name:"Rapanui",type:"rapanui"},{name:"Mundo Animal",type:"mundoanimal"},
  {name:"Liberty",type:"liberty"},{name:"Bistrô",type:"bistro"},{name:"Miray Sushi",type:"miray"},
  {name:"Mokai",type:"standard"},{name:"Duda",type:"standard"},{name:"Degusta",type:"standard"},
  {name:"Farmácia Assoc.",type:"standard"},{name:"Sushi House",type:"standard"},
  {name:"Arquidelícias",type:"standard"},{name:"Itália",type:"standard"},
  {name:"Rei Pão Qjo",type:"standard"},{name:"Brahma",type:"standard"},
  {name:"Tanara",type:"standard"},{name:"Joaninha",type:"standard"},
  {name:"Núbia",type:"especial"},{name:"Lanche das Meninas",type:"especial"},
  {name:"Tevittos",type:"especial"},{name:"Lotus Açaí",type:"especial"},
  {name:"Pastelaria Sem Noção",type:"especial"},{name:"Xizaria Salles",type:"especial"},
];

const TYPES = {
  cbt:        { label:"Centro R$10 | Bairro R$15 | Trevo R$20", mode:"zone", zones:[{label:"Centro",fee:10},{label:"Bairro",fee:15},{label:"Trevo",fee:20}] },
  agatha:     { label:"Cidade R$15 | Trevo R$20", mode:"zone", zones:[{label:"Cidade",fee:15},{label:"Trevo",fee:20}] },
  orbita:     { label:"Centro R$12 | Bairro R$15 | Trevo R$20", mode:"zone", zones:[{label:"Centro",fee:12},{label:"Bairro",fee:15},{label:"Trevo",fee:20}] },
  nickel:     { label:"Petrópolis R$10 | São José e Outros R$15 | Trevo R$20", mode:"zone", zones:[{label:"Petrópolis",fee:10},{label:"São José e Outros",fee:15},{label:"Trevo",fee:20}] },
  rapanui:    { label:"Centro R$10 | Até 2km R$12 | Bairro R$15 | Trevo R$20", mode:"zone", zones:[{label:"Centro",fee:10},{label:"Até 2km",fee:12},{label:"Bairro",fee:15},{label:"Trevo",fee:20}] },
  mundoanimal:{ label:"Até 2km R$10 | Acima R$15 | Trevo R$20", mode:"dist", distFn: km=>km<=2?{fee:10,note:"Até 2km"}:km<=8?{fee:15,note:"Acima de 2km"}:{fee:20,note:"Trevo"} },
  liberty:    { label:"Até 2km R$12 | Acima R$15 | Trevo R$20", mode:"dist", distFn: km=>km<=2?{fee:12,note:"Até 2km"}:km<=8?{fee:15,note:"Acima de 2km"}:{fee:20,note:"Trevo"} },
  bistro:     { label:"Até 2km R$10 | Até 2.9km R$12 | ≥3km R$15 | Trevo R$20", mode:"dist", distFn: km=>km<=2?{fee:10,note:"Até 2km"}:km<=2.9?{fee:12,note:"Até 2.9km"}:km<=8?{fee:15,note:"Acima de 3km"}:{fee:20,note:"Trevo"} },
  miray:      { label:"Até 1km R$10 | 2-3km R$12 | >3km R$15 | >5km R$18 | Trevo R$20", mode:"dist", distFn: km=>km<=1?{fee:10,note:"Até 1km"}:km<=3?{fee:12,note:"Até 3km"}:km<=5?{fee:15,note:"Até 5km"}:km<=8?{fee:18,note:"Até 8km"}:{fee:20,note:"Trevo"} },
  standard:   { label:"Tabela padrão por km", mode:"dist", distFn: km=>km<=1?{fee:10,note:"Até 1km"}:km<=2?{fee:11,note:"Até 2km"}:km<=3?{fee:12,note:"Até 3km"}:km<=4?{fee:14,note:"Até 4km"}:km<=5?{fee:15,note:"Até 5km"}:km<=6?{fee:18,note:"Até 6km"}:km<=8?{fee:20,note:"Até 8km"}:km<=10?{fee:23,note:"Até 10km"}:km<=11?{fee:25,note:"Até 11km"}:null },
  especial:   { label:"Tabela especial por km", mode:"dist", distFn: km=>km<=1?{fee:11,note:"Até 1km"}:km<=2?{fee:12,note:"Até 2km"}:km<=3?{fee:14,note:"Até 3km"}:km<=4?{fee:16,note:"Até 4km"}:km<=5?{fee:18,note:"Até 5km"}:km<=6?{fee:21,note:"Até 6km"}:km<=7?{fee:22,note:"Até 7km"}:km<=8?{fee:23,note:"Até 8km"}:km<=9?{fee:24,note:"Até 9km"}:km<=10?{fee:25,note:"Até 10km"}:km<=12?{fee:30,note:"Até 12km"}:km<=14?{fee:35,note:"Até 14km"}:null },
};

let sel = null;
const si = document.getElementById('storeSearch');
const dd = document.getElementById('dropdown');

si.addEventListener('input', () => {
  const q = si.value.trim().toLowerCase();
  if (!q) { dd.classList.remove('open'); return; }
  const m = STORES.filter(s => s.name.toLowerCase().includes(q));
  if (!m.length) { dd.classList.remove('open'); return; }
  dd.innerHTML = m.map(s => `<div onclick="pick(${STORES.indexOf(s)})">${s.name}<small>${TYPES[s.type].label}</small></div>`).join('');
  dd.classList.add('open');
});

document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) dd.classList.remove('open'); });

function pick(idx) {
  sel = STORES[idx];
  si.value = sel.name;
  dd.classList.remove('open');
  const def = TYPES[sel.type];
  hide();
  const zs = document.getElementById('zoneSection');
  const ds = document.getElementById('distSection');
  const zsel = document.getElementById('zoneSelect');
  const di = document.getElementById('distInput');
  di.value = ''; zsel.value = '';
  if (def.mode === 'zone') {
    zs.classList.add('visible'); ds.classList.remove('visible');
    zsel.innerHTML = '<option value="">— escolha —</option>' + def.zones.map((z,i)=>`<option value="${i}">${z.label} — R$${z.fee}</option>`).join('');
    zsel.onchange = calc;
  } else {
    ds.classList.add('visible'); zs.classList.remove('visible');
    di.oninput = calc;
  }
}

function calc() {
  if (!sel) return;
  const def = TYPES[sel.type];
  if (def.mode === 'zone') {
    const idx = document.getElementById('zoneSelect').value;
    if (!idx) { hide(); return; }
    const z = def.zones[+idx];
    show(z.fee, z.label, def.label);
  } else {
    const km = parseFloat(document.getElementById('distInput').value);
    if (isNaN(km)||km<0) { hide(); return; }
    const r = def.distFn(km);
    if (!r) { hide(); document.getElementById('no-result').classList.add('visible'); return; }
    show(r.fee, r.note, def.label);
  }
}

function show(fee, zone, rule) {
  document.getElementById('no-result').classList.remove('visible');
  document.getElementById('rStoreName').textContent = sel.name;
  document.getElementById('rFee').textContent = `R$ ${fee},00`;
  document.getElementById('rNote').textContent = `${zone}  ·  ${rule}`;
  document.getElementById('result').classList.add('visible');
}

function hide() {
  document.getElementById('result').classList.remove('visible');
  document.getElementById('no-result').classList.remove('visible');
}
</script>
</body>
</html>
